name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── 1. Build the image and push to GitHub Container Registry ──────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # tag both :latest and :<git-sha> so you can roll back by sha
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. SSH into the VPS and restart only the app container ────────────────
  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}:latest" >> $GITHUB_ENV

      - uses: appleboy/ssh-action@v1
        env:
          IMAGE: ${{ env.IMAGE }}
          CR_PAT: ${{ secrets.CR_PAT }}        # GitHub PAT with read:packages scope
          CR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}         # optional — defaults to 22
          envs: IMAGE,CR_PAT,CR_USER
          script: |
            # Authenticate to ghcr.io from the VPS
            echo "$CR_PAT" | docker login ghcr.io -u "$CR_USER" --password-stdin

            cd /opt/pawonwarga

            # Pull the new image and restart only the app (db & redis stay up)
            APP_IMAGE=$IMAGE docker compose pull app
            APP_IMAGE=$IMAGE docker compose up -d --no-deps app

            # Remove dangling images to free disk space
            docker image prune -f
